name: Web2App Auto Builder

on:
  repository_dispatch:
    types: [build_apk]

permissions:
  contents: write
  
jobs:
  build-apk:
    name: Build APK for ${{ github.event.client_payload.app_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'
          cache-disabled: true

      - name: Inject Configurations, Package Name & Features
        run: |
          # 1. Inject App Name & URL
          sed -i "s/APP_NAME_PLACEHOLDER/${{ github.event.client_payload.app_name }}/g" app/src/main/res/values/strings.xml
          sed -i "s|TARGET_URL_PLACEHOLDER|${{ github.event.client_payload.target_url }}|g" app/src/main/java/com/web2app/builder/MainActivity.kt
          
          # 2. Inject Package Name Asli (Mencegah aplikasi tertimpa saat diinstall)
          sed -i "s/com.web2app.builder/${{ github.event.client_payload.package_name }}/g" app/build.gradle.kts
          sed -i "s/com.web2app.builder/${{ github.event.client_payload.package_name }}/g" app/src/main/java/com/web2app/builder/MainActivity.kt
          
          # 3. Inject Fullscreen Mode
          if [ '${{ github.event.client_payload.is_fullscreen }}' == 'true' ]; then
            sed -i 's/Theme.NoTitleBar/Theme.NoTitleBar.Fullscreen/g' app/src/main/AndroidManifest.xml
          fi

      - name: Download & Fix Logo
        run: |
          # Install tool konversi gambar
          sudo apt-get update && sudo apt-get install -y imagemagick
          mkdir -p app/src/main/res/mipmap-xxxhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-hdpi
          
          # Download gambar ke file sementara
          curl -L "${{ github.event.client_payload.logo_url }}" -o temp_logo
          
          # Paksa konversi ke PNG standar Android (mengatasi AAPT error file failed to compile)
          convert temp_logo -background none -resize 192x192 -gravity center -extent 192x192 PNG32:app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert temp_logo -background none -resize 144x144 -gravity center -extent 144x144 PNG32:app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert temp_logo -background none -resize 96x96 -gravity center -extent 96x96 PNG32:app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert temp_logo -background none -resize 72x72 -gravity center -extent 72x72 PNG32:app/src/main/res/mipmap-hdpi/ic_launcher.png

      - name: Build and Sign APK
        run: |
          gradle assembleRelease --no-daemon
          
          keytool -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -keyalg RSA -keysize 2048 -validity 9125
          
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks debug.keystore --ks-pass pass:android app/build/outputs/apk/release/app-release-unsigned.apk
          mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release-signed.apk

      - name: Upload APK & Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: "APK terbaru dari Web2App Builder."
          files: app/build/outputs/apk/release/app-release-signed.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get APK Link & Update Firebase
        if: always()
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/latest/app-release-signed.apk"
          status=$([[ ${{ job.status }} == 'success' ]] && echo 'SELESAI' || echo 'ERROR')
          
          curl -X PATCH -H "Content-Type: application/json" \
          -d "{\"status\":\"$status\", \"download_url\":\"$DOWNLOAD_URL\"}" \
          "https://web2app-f7e96-default-rtdb.asia-southeast1.firebasedatabase.app/builds/${{ github.event.client_payload.build_id }}.json"
